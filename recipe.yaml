# ditto 워크스페이스 recipe (checked-in, tier ② — git-shared).
# wi_260629i9c: ditto 자신의 하드코딩 pre-push 게이트를 recipe 기반 게이트로 일반화(도그푸드).
#
# push_gate: 푸시 전 test_command 가 통과해야 하는 브랜치를 선언한다. git pre-push 게이트
# (`ditto push-gate`)가 push 시점에 소비한다 — `ditto setup` 이 아니다.
# protected_branches 의 "*" 는 전체 브랜치 sentinel: 모든 브랜치 push 가 게이트된다
# (DoD 테스트는 매 push 마다 돌아야 한다 — 기존 .githooks/pre-push 동작 유지).
push_gate:
  protected_branches: ["*"]
  test_command: "bun test"

# barrier_opt_out: ditto는 in-loop 배리어를 두지 않는다(명시적 opt-out, [6] 결정 A).
# ditto 테스트는 전부 in-process(실 인프라 없음)라 배리어 unit-subset이 push_gate 전체
# 스위트와 사실상 동일 — 배리어를 켜면 매 heavy 완료마다 push_gate를 중복 실행할 뿐이다.
# push_gate가 이미 전체를 게이트하고 노드별 검증은 mid-wave scope-local unit이 담당하므로,
# 배리어는 not-applicable로 둔다(명령 부재를 degrade-floor가 아니라 해당없음으로 처리).
# 이는 의도적 opt-out이며, 그냥 미선언(=floor, 안전 기본값)과 구별된다.
barrier_opt_out: true

# authored_test_command: pre-approval phantom-red 게이트가 authored red 테스트를
# 파일 단위로 실행할 때 쓰는 러너(wi_2607103tp ac-1). ditto 자신은 bun 스택이므로
# "bun test"를 준다. barrier_test_command와 의도적으로 분리돼 있어, 이 필드는
# phantom-red만 구동할 뿐 settled-tree 배리어를 무장(arm)하지 않는다 — barrier는
# barrier_test_command에서만 해석되며 여기 미선언 상태를 유지한다(위 opt-out과 정합).
authored_test_command: "bun test"
